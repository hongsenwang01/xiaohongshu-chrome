spring.application.name=hello

# Optional local overrides for private secrets
spring.config.import=optional:file:./application-local.properties,optional:file:./config/application-local.properties

# Active profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Encoding
file.encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.tomcat.uri-encoding=UTF-8
logging.charset.console=${LOGGING_CONSOLE_CHARSET:GBK}
logging.charset.file=UTF-8

# Common datasource config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Common JPA config
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

# Time zone
spring.jackson.time-zone=Asia/Shanghai
spring.datasource.url.properties.serverTimezone=Asia/Shanghai

# WeChat payment
wechat.pay.merchant-id=${WECHAT_PAY_MERCHANT_ID:}
wechat.pay.app-id=${WECHAT_PAY_APP_ID:}
wechat.pay.api-v3-key=${WECHAT_PAY_API_V3_KEY:}
wechat.pay.certificate-serial-number=${WECHAT_PAY_CERT_SERIAL:}
wechat.pay.certificate-path=${WECHAT_PAY_CERT_PATH:classpath:cert/apiclient_cert.p12}
wechat.pay.notify-url=${WECHAT_PAY_NOTIFY_URL:}
wechat.pay.gateway-url=${WECHAT_PAY_GATEWAY_URL:https://api.mch.weixin.qq.com}

# API protection
license.api.token=${LICENSE_API_TOKEN:}

# Object storage
object.storage.access-key=${OBJECT_STORAGE_ACCESS_KEY:}
object.storage.secret-key=${OBJECT_STORAGE_SECRET_KEY:}
object.storage.endpoint=${OBJECT_STORAGE_ENDPOINT:https://objectstorageapi.hzh.sealos.run}
object.storage.endpoint-internal=${OBJECT_STORAGE_ENDPOINT_INTERNAL:http://object-storage.objectstorage-system.svc.cluster.local}
object.storage.bucket-name=${OBJECT_STORAGE_BUCKET_NAME:}
object.storage.plugin-filename=${OBJECT_STORAGE_PLUGIN_FILENAME:chrome-extension.zip}
